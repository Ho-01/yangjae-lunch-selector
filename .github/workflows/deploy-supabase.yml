name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - 'lunch-wheel/supabase/migrations/**'
      - 'lunch-wheel/supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:
    inputs:
      repair_manually_applied_room_migrations:
        description: 'One-time: mark the verified 2026-07-23/24 room migrations as applied'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply database migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    defaults:
      run:
        working-directory: lunch-wheel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate deployment configuration
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing GitHub Actions secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::Missing GitHub Actions secret: SUPABASE_PROJECT_ID"
            exit 1
          fi
          if [ "$SUPABASE_PROJECT_ID" != "cipkaybwqdgevzhdguaq" ]; then
            echo "::error::SUPABASE_PROJECT_ID does not match the production project ref."
            exit 1
          fi

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Repair verified manually applied room migration history
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.repair_manually_applied_room_migrations
        run: |
          supabase migration repair \
            20260723090000 \
            20260723130000 \
            20260723150000 \
            20260723170000 \
            20260724150000 \
            20260724170000 \
            20260724190000 \
            --status applied \
            --linked

      - name: Show migration status
        run: supabase migration list --linked

      - name: Preview pending migrations
        run: supabase db push --linked --dry-run

      - name: Apply pending migrations
        run: supabase db push --linked

      - name: Verify migration status
        run: supabase migration list --linked
